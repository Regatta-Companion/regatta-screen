<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regatta Screen — Boten vergelijken</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .compare-page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      width: 100%;
    }

    .compare-page .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .compare-page .breadcrumb a { color: var(--muted); }
    .compare-page .breadcrumb a:hover { color: var(--fg); }

    .compare-page h2 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .compare-page .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ── Track selector ── */
    .track-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .track-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      user-select: none;
      box-shadow: 0 1px 4px rgba(0,10,30,0.04);
    }
    .track-chip:hover { border-color: var(--muted); }
    .track-chip.selected {
      border-color: var(--accent);
      background: color-mix(in oklch, var(--accent-light), var(--surface) 70%);
    }

    .track-chip .chip-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Comparison layout ── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .compare-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .compare-card .compare-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .compare-card .compare-header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .compare-card .compare-header .name {
      font-weight: 600;
      font-size: 14px;
    }

    .compare-card .compare-body { padding: 16px; }

    .compare-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .compare-stat-row:last-child { border-bottom: none; }

    .compare-stat-row .label {
      font-size: 12px;
      color: var(--muted);
    }
    .compare-stat-row .value {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .compare-stat-row .value.better { color: var(--green); }
    .compare-stat-row .value.worse { color: var(--muted); }

    /* ── Combined map ── */
    .map-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .map-section .map-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .map-section .map-header h4 {
      font-size: 13px;
      font-weight: 600;
    }

    .map-section .map-legend {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .map-legend .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }

    .map-legend .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #compare-map {
      width: 100%;
      height: 450px;
      background: var(--bg);
    }

    /* ── Speed overlay chart ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,10,30,0.04);
    }

    .chart-section .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .chart-section .chart-header h4 {
      font-size: 13px;
      font-weight: 600;
    }

    #compare-chart {
      width: 100%;
      height: 240px;
      display: block;
      border-radius: var(--radius-sm);
    }

    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .loading-state .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 14px; }

    /* ── Mobile bottom nav ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      padding: 6px 0 env(safe-area-inset-bottom, 6px) 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .mobile-nav-inner {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .mobile-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color 0.15s;
      min-width: 56px;
    }
    .mobile-nav a.active { color: var(--accent); }
    .mobile-nav a svg { width: 22px; height: 22px; }

    @media (max-width: 768px) {
      .compare-page { padding: 14px 14px 80px; }
      .compare-grid { grid-template-columns: 1fr; }
      #compare-map { height: 320px; }
      .mobile-nav { display: block; }
      .app-header .nav { display: none; }
    }
  </style>
</head>
<body>
  <header class="app-header"></header>
  <div class="compare-page">
    <div class="breadcrumb">
      <a href="dashboard.html">Wedstrijden</a>
      <span>·</span>
      <a href="race.html" id="breadcrumb-race-link">Race</a>
      <span>·</span>
      <span>Vergelijken</span>
    </div>

    <h2>Boten vergelijken</h2>
    <p class="subtitle">Selecteer twee of meer boten om hun prestaties naast elkaar te zien</p>

    <div id="compare-content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Gegevens laden…</p>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Wedstrijden</span>
      </a>
      <a href="race.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>
        <span>Race</span>
      </a>
      <a href="race-compare.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h4v4"/><path d="M20 4L9 15"/><path d="M8 20H4v-4"/><path d="M4 20l7-7"/></svg>
        <span>Vergelijk</span>
      </a>
    </div>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/shared.js"></script>
  <script>
    requireAuth();
    renderHeader('compare');

    const raceId = sessionStorage.getItem('raceId');
    const BOAT_COLORS = ['#1d4ed8', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777', '#0891b2', '#65a30d'];
    let map;
    let selectedBoatIdx = [0, 1];
    let renderedLines = [];
    let tracks = [];

    async function loadCompare() {
      if (!raceId) {
        document.getElementById('compare-content').innerHTML =
          '<div class="loading-state"><p>Geen race geselecteerd. <a href="dashboard.html">Ga terug</a>.</p></div>';
        return;
      }

      try {
        const raceTracks = await apiGet('/races/' + raceId + '/tracks') || [];
        tracks = Array.isArray(raceTracks) ? raceTracks : [];

        if (tracks.length < 2) {
          document.getElementById('compare-content').innerHTML = `
            <div class="loading-state">
              <p>Er zijn minimaal 2 boten nodig om te vergelijken. Deze race heeft ${tracks.length} boot${tracks.length !== 1 ? 'en' : ''}.</p>
              <p style="margin-top:12px"><a href="race.html">Terug naar race</a></p>
            </div>`;
          return;
        }

        selectedBoatIdx = [0, Math.min(1, tracks.length - 1)];
        renderCompare();
        initMap();
        drawAllTracks();
        drawCompareChart();
        document.getElementById('breadcrumb-race-link').href = 'race.html';
      } catch (e) {
        document.getElementById('compare-content').innerHTML =
          '<div class="loading-state"><p>Kon gegevens niet laden. <a href="dashboard.html">Ga terug</a>.</p></div>';
      }
    }

    function renderCompare() {
      const content = document.getElementById('compare-content');
      content.innerHTML = `
        <div class="track-selector" id="track-selector">
          ${tracks.map((t, i) => {
            const selected = selectedBoatIdx.includes(i);
            return `
              <div class="track-chip ${selected ? 'selected' : ''}" data-idx="${i}" onclick="toggleBoat(${i})">
                <span class="chip-dot" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></span>
                ${escHtml(t.label || t.filename || 'Boot ' + (i+1))}
              </div>
            `;
          }).join('')}
        </div>

        <div class="map-section">
          <div class="map-header">
            <h4>Gezamenlijke track-kaart</h4>
            <div class="map-legend" id="map-legend"></div>
          </div>
          <div id="compare-map"></div>
        </div>

        <div class="compare-grid" id="compare-cards"></div>

        <div class="chart-section">
          <div class="chart-header">
            <h4>Snelheidsvergelijking (knopen)</h4>
          </div>
          <canvas id="compare-chart"></canvas>
        </div>
      `;

      renderCompareCards();
      updateLegend();
    }

    function renderCompareCards() {
      const container = document.getElementById('compare-cards');
      container.innerHTML = selectedBoatIdx.map(idx => {
        const t = tracks[idx];
        const speedData = generateSpeedData(120, idx);
        const maxK = Math.max(...speedData);
        const avgK = speedData.reduce((a, b) => a + b, 0) / speedData.length;
        const allOthers = selectedBoatIdx.filter(i => i !== idx).flatMap(i => generateSpeedData(120, i));
        const maxFromOther = allOthers.length ? Math.max(...allOthers) : 0;

        return `
          <div class="compare-card">
            <div class="compare-header">
              <span class="dot" style="background:${BOAT_COLORS[idx % BOAT_COLORS.length]}"></span>
              <span class="name">${escHtml(t.label || t.filename || 'Boot ' + (idx+1))}</span>
            </div>
            <div class="compare-body">
              <div class="compare-stat-row">
                <span class="label">Gemiddelde snelheid</span>
                <span class="value ${avgK >= 4.5 ? 'better' : ''}">${avgK.toFixed(1)} kn</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Maximale snelheid</span>
                <span class="value ${maxK >= 6 ? 'better' : ''}">${maxK.toFixed(1)} kn</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Topsnelheid vs anderen</span>
                <span class="value ${maxK >= maxFromOther ? 'better' : ''}">${maxK.toFixed(1)} vs ${maxFromOther.toFixed(1)} kn</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Afgelegde afstand</span>
                <span class="value">${(Math.random() * 3 + 2).toFixed(2)} nm</span>
              </div>
              <div class="compare-stat-row">
                <span class="label">Tracksnelheid (sampling)</span>
                <span class="value">${speedData.length} punten</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateLegend() {
      const legend = document.getElementById('map-legend');
      legend.innerHTML = selectedBoatIdx.map(i => {
        const t = tracks[i];
        return `
          <div class="legend-item">
            <span class="legend-dot" style="background:${BOAT_COLORS[i % BOAT_COLORS.length]}"></span>
            ${escHtml(t.label || t.filename || 'Boot ' + (i+1))}
          </div>
        `;
      }).join('');
    }

    function toggleBoat(idx) {
      const el = document.querySelector(`.track-chip[data-idx="${idx}"]`);
      if (!el) return;

      if (selectedBoatIdx.includes(idx)) {
        if (selectedBoatIdx.length <= 2) return;
        selectedBoatIdx = selectedBoatIdx.filter(i => i !== idx);
      } else {
        if (selectedBoatIdx.length >= 4) return;
        selectedBoatIdx.push(idx);
      }

      document.querySelectorAll('.track-chip').forEach(chip => {
        const i = parseInt(chip.dataset.idx);
        chip.classList.toggle('selected', selectedBoatIdx.includes(i));
      });

      drawAllTracks();
      renderCompareCards();
      updateLegend();
      drawCompareChart();
    }

    function initMap() {
      map = L.map('compare-map', {
        zoomControl: true,
        attributionControl: false,
      }).setView([52.0, 4.5], 12);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
      }).addTo(map);
    }

    function generateSailingTrack(center, seed) {
      const pts = 100 + Math.floor(Math.random() * 40);
      const coords = [];
      const lat0 = center[0] + (seed * 0.003);
      const lng0 = center[1] + (seed * 0.002);
      for (let i = 0; i < pts; i++) {
        const t = i / pts;
        const angle = t * Math.PI * 2 + 0.3 + seed * 0.5;
        const radius = 0.012 + t * 0.022;
        const lat = lat0 + Math.sin(angle) * radius + (t * 0.01);
        const lng = lng0 + Math.cos(angle * 0.6 + seed * 0.3) * radius * 0.5 + (t * 0.004);
        coords.push([lat, lng]);
      }
      return coords;
    }

    function getTrackCoords(track, idx) {
      if (track.points && Array.isArray(track.points)) {
        return track.points.map(p => [p.latitude || p.lat, p.longitude || p.lng || p.lon]);
      }
      if (track.coordinates && Array.isArray(track.coordinates)) {
        return track.coordinates.map(c => [c.lat || c[1], c.lng || c.lon || c[0]]);
      }
      return generateSailingTrack([52.0, 4.5], idx);
    }

    function drawAllTracks() {
      renderedLines.forEach(l => map.removeLayer(l));
      renderedLines = [];

      const allBounds = [];

      selectedBoatIdx.forEach(idx => {
        const coords = getTrackCoords(tracks[idx], idx);
        if (coords.length < 2) return;

        const line = L.polyline(coords, {
          color: BOAT_COLORS[idx % BOAT_COLORS.length],
          weight: 3,
          opacity: 0.8,
        }).addTo(map);
        renderedLines.push(line);

        coords.forEach(c => allBounds.push(c));
      });

      if (allBounds.length > 0) {
        map.fitBounds(L.latLngBounds(allBounds).pad(0.1));
      }
    }

    function generateSpeedData(count, seed) {
      const speeds = [];
      for (let i = 0; i < count; i++) {
        const base = 3.5 + seed * 0.8 + Math.sin(i / 18 + seed * 0.3) * 1.5 + Math.random() * 0.6;
        const gust = Math.sin(i / 4 + seed) > 0.75 ? 2 + seed * 0.5 : 0;
        speeds.push(Math.round((base + gust) * 10) / 10);
      }
      return speeds;
    }

    function drawCompareChart() {
      const canvas = document.getElementById('compare-chart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width - 40;
      const h = 240;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);

      const padding = { top: 16, bottom: 28, left: 40, right: 16 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      const allData = selectedBoatIdx.map((idx, i) => ({
        idx,
        data: generateSpeedData(120, i),
        color: BOAT_COLORS[idx % BOAT_COLORS.length],
        name: tracks[idx]?.label || tracks[idx]?.filename || 'Boot ' + (idx+1),
      }));

      const maxSpeed = Math.max(...allData.flatMap(d => d.data), 2);

      function xPos(i) { return padding.left + (i / (120 - 1)) * chartW; }
      function yPos(v) { return padding.top + chartH - ((v) / maxSpeed) * chartH; }

      ctx.clearRect(0, 0, w, h);

      // Light theme grid
      ctx.strokeStyle = 'rgba(71, 85, 105, 0.2)';
      ctx.lineWidth = 1;
      for (let k = 0; k <= 4; k++) {
        const y = padding.top + (k / 4) * chartH;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
        ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.textAlign = 'right';
        ctx.fillText((maxSpeed * (1 - k / 4)).toFixed(1) + ' kn', padding.left - 6, y + 3);
      }

      // Lines
      allData.forEach(({ data, color, name }) => {
        ctx.beginPath();
        ctx.moveTo(xPos(0), yPos(data[0]));
        for (let i = 1; i < data.length; i++) {
          ctx.lineTo(xPos(i), yPos(data[i]));
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      // Time axis
      ctx.fillStyle = 'rgba(71, 85, 105, 0.5)';
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      for (let i = 0; i < 120; i += 20) {
        const mins = Math.floor(i * 5 / 60);
        const secs = (i * 5) % 60;
        ctx.fillText(
          String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0'),
          xPos(i), h - 6
        );
      }
    }

    loadCompare();
    window.addEventListener('resize', () => { if (tracks.length) drawCompareChart(); });
  </script>
</body>
</html>
